name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy generate-demo-agent --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy create-web-call --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy update-agent --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy create-checkout-session --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy stripe-webhook --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy retell-webhook --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy cal-webhook --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy admin-create-client --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy admin-delete-client --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy subscribe-newsletter --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy unsubscribe-newsletter --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy send-newsletter --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy send-push-notification --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
          supabase functions deploy daily-summary --project-ref zubhxdlssoochwbwyxlp --use-api --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

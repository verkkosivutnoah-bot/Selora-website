<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Selora vastaa, sinä työskentelet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1080px; height:1350px; overflow:hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    background: #060c18;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .aurora {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 800px 600px at 30% 20%, rgba(29,78,216,0.5) 0%, rgba(6,12,24,0) 60%),
      radial-gradient(ellipse 700px 600px at 75% 80%, rgba(59,130,246,0.32) 0%, rgba(6,12,24,0) 65%),
      linear-gradient(180deg, #050a14 0%, #060c18 50%, #04080f 100%);
  }
  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(96,165,250,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 800px 700px at 50% 50%, #000 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 800px 700px at 50% 50%, #000 0%, transparent 80%);
  }
  .noise {
    position:absolute; inset:0;
    opacity: 0.05; mix-blend-mode: overlay; pointer-events:none;
  }
  .content { position:relative; z-index:2; width:100%; height:100%; }

  /* Logo top-right */
  .logo {
    position:absolute; top:60px; right:60px;
    display:flex; align-items:center; gap:14px;
  }
  .logo-mark {
    width:42px; height:42px;
    border-radius: 11px;
    background: linear-gradient(135deg, #1D4ED8 0%, #3b82f6 100%);
    box-shadow:
      0 8px 24px rgba(29,78,216,0.45),
      inset 0 1px 0 rgba(255,255,255,0.25);
    position:relative;
  }
  .logo-mark::after {
    content:""; position:absolute; inset:0;
    border-radius:11px;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35), transparent 55%);
  }
  .logo-text {
    font-weight: 600;
    letter-spacing: 0.08em;
    font-size: 20px;
    color:#fff;
  }

  /* Headline top */
  .headline {
    position:absolute;
    top: 110px; left: 60px;
    font-weight: 300;
    font-size: 72px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color:#fff;
    max-width: 780px;
  }
  .headline em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color:#93c5fd;
  }

  /* Middle split */
  .split {
    position:absolute;
    top: 380px;
    left: 0; right: 0;
    height: 700px;
    display:flex;
  }
  .left-pane, .right-pane {
    flex: 1;
    position:relative;
  }

  /* Phone with rings — left */
  .phone-area {
    position:absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 420px; height: 420px;
    display:flex; align-items:center; justify-content:center;
  }
  .ring {
    position:absolute;
    border-radius:50%;
    border: 2px solid rgba(96,165,250,0.5);
    box-shadow: 0 0 40px rgba(96,165,250,0.2);
  }
  .ring-1 { width: 200px; height:200px; opacity: 0.9; }
  .ring-2 { width: 300px; height:300px; opacity: 0.55; border-color: rgba(96,165,250,0.4); }
  .ring-3 { width: 410px; height:410px; opacity: 0.3; border-color: rgba(96,165,250,0.28); }

  .phone-shape {
    width: 100px; height: 180px;
    border-radius: 22px;
    background: linear-gradient(160deg, #1D4ED8 0%, #1e3a8a 100%);
    box-shadow:
      0 18px 50px rgba(29,78,216,0.5),
      inset 0 1px 0 rgba(255,255,255,0.3),
      inset 0 -1px 0 rgba(0,0,0,0.3);
    position:relative;
    z-index:2;
    display:flex; align-items:center; justify-content:center;
  }
  .phone-shape::before {
    content:""; position:absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 4px;
  }
  .phone-shape svg { width: 36px; height: 36px; opacity: 0.95; }

  /* Dashboard card — right */
  .dash {
    position:absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 440px;
    background: linear-gradient(180deg, rgba(15,23,42,0.85) 0%, rgba(8,14,28,0.9) 100%);
    border: 1px solid rgba(96,165,250,0.18);
    border-radius: 20px;
    padding: 26px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
  }
  .dash-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 18px;
  }
  .dash-title {
    font-size: 14px; font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .dash-dot {
    display:inline-block; width:8px; height:8px;
    border-radius:50%; background:#22c55e;
    box-shadow: 0 0 12px #22c55e;
    margin-right:8px;
  }

  .call-row {
    display:flex; align-items:center; gap: 12px;
    padding: 14px 0;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .call-row:first-of-type { border-top: 0; padding-top: 0; }

  .call-status {
    font-size: 14px; font-weight: 500;
    color: #86efac;
  }
  .call-meta {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  .call-text {
    margin-top: 14px;
    padding: 14px 16px;
    background: rgba(96,165,250,0.08);
    border-left: 2px solid #3b82f6;
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.45;
    color: rgba(255,255,255,0.85);
    font-style: italic;
  }

  /* Bottom CTA + URL */
  .bottom {
    position:absolute;
    bottom: 80px;
    left: 60px; right: 60px;
    display:flex;
    align-items:center;
    justify-content: space-between;
  }
  .url {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.04em;
  }
  .cta {
    background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
    color: #0f172a;
    font-weight: 600;
    font-size: 22px;
    padding: 20px 34px;
    border-radius: 999px;
    box-shadow:
      0 14px 40px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.9);
  }
</style>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid"></div>
  <svg class="noise" xmlns="http://www.w3.org/2000/svg">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="content">
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">SELORA</div>
    </div>

    <div class="headline">Selora <em>vastaa,</em><br>sinä työskentelet.</div>

    <div class="split">
      <div class="left-pane">
        <div class="phone-area">
          <div class="ring ring-3"></div>
          <div class="ring ring-2"></div>
          <div class="ring ring-1"></div>
          <div class="phone-shape">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="right-pane">
        <div class="dash">
          <div class="dash-head">
            <div class="dash-title">Selora dashboard</div>
            <div style="font-size:13px; color:rgba(255,255,255,0.4);">Tänään</div>
          </div>
          <div class="call-row">
            <div>
              <span class="dash-dot"></span><span class="call-status">Vastattu</span>
              <div class="call-meta" style="margin-top:4px;">12:43 · 4 min · Anna K.</div>
            </div>
          </div>
          <div class="call-text">"Hei, haluaisin varata leikkauksen huomenaamulle..."</div>
          <div class="call-row" style="margin-top:14px;">
            <div>
              <span class="dash-dot"></span><span class="call-status">Vastattu</span>
              <div class="call-meta" style="margin-top:4px;">11:08 · 2 min · Mika T.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="url">selora.fi</div>
      <div class="cta">Varaa demo →</div>
    </div>
  </div>
</body>
</html>

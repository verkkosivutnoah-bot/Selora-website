<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Selora — +34 % enemmän varauksia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1080px; height:1350px; overflow:hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    background: #060c18;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* Aurora background — multi-layer gradients */
  .aurora {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 900px 600px at 25% 15%, rgba(29,78,216,0.55) 0%, rgba(6,12,24,0) 60%),
      radial-gradient(ellipse 800px 700px at 80% 85%, rgba(59,130,246,0.32) 0%, rgba(6,12,24,0) 65%),
      radial-gradient(ellipse 600px 500px at 50% 50%, rgba(96,165,250,0.18) 0%, rgba(6,12,24,0) 70%),
      linear-gradient(180deg, #050a14 0%, #060c18 50%, #04080f 100%);
  }

  /* Noise overlay */
  .noise {
    position:absolute; inset:0;
    opacity: 0.05;
    mix-blend-mode: overlay;
    pointer-events:none;
  }

  /* Subtle grid */
  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(96,165,250,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 800px 600px at 50% 50%, #000 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 800px 600px at 50% 50%, #000 0%, transparent 80%);
  }

  .content { position:relative; z-index:2; width:100%; height:100%; }

  /* Logo lockup */
  .logo {
    position:absolute; top:60px; left:60px;
    display:flex; align-items:center; gap:18px;
  }
  .logo-mark {
    width:46px; height:46px;
    border-radius: 12px;
    background: linear-gradient(135deg, #1D4ED8 0%, #3b82f6 100%);
    box-shadow:
      0 8px 24px rgba(29,78,216,0.45),
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 -1px 0 rgba(0,0,0,0.2);
    position:relative;
  }
  .logo-mark::after {
    content:""; position:absolute; inset:0;
    border-radius:12px;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35), transparent 55%);
  }
  .logo-text {
    font-weight: 600;
    letter-spacing: 0.08em;
    font-size: 22px;
    color: #fff;
  }

  /* Center stack */
  .center {
    position:absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    text-align: center;
  }

  .stat {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 360px;
    line-height: 0.95;
    letter-spacing: -0.05em;
    background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.55) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 8px 30px rgba(96,165,250,0.35)) drop-shadow(0 2px 0 rgba(255,255,255,0.1));
    margin: 0;
    padding: 0 0 8px 0;
  }
  .stat .pct {
    font-size: 220px;
    vertical-align: 0.18em;
    margin-left: -8px;
  }

  .eyebrow {
    font-weight: 500;
    font-size: 26px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #60a5fa;
    margin-top: 48px;
  }

  .subhead {
    font-weight: 300;
    font-size: 42px;
    line-height: 1.25;
    color: #fff;
    margin-top: 22px;
    letter-spacing: -0.01em;
  }
  .subhead em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: #93c5fd;
  }

  /* CTA pill */
  .cta {
    position: absolute;
    bottom: 70px; right: 60px;
    background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
    color: #0f172a;
    font-weight: 600;
    font-size: 22px;
    padding: 20px 34px;
    border-radius: 999px;
    box-shadow:
      0 14px 40px rgba(0,0,0,0.35),
      0 2px 6px rgba(0,0,0,0.2),
      inset 0 1px 0 rgba(255,255,255,0.9);
    letter-spacing: -0.005em;
    display:inline-flex; align-items:center; gap:10px;
  }

  .url {
    position:absolute; bottom: 84px; left: 60px;
    font-size: 20px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid"></div>
  <svg class="noise" xmlns="http://www.w3.org/2000/svg">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>
  <div class="content">
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">SELORA</div>
    </div>

    <div class="center">
      <div class="stat">+34<span class="pct">%</span></div>
      <div class="eyebrow">Enemmän varauksia</div>
      <div class="subhead">Kuukauden kuluttua <em>käyttöönotosta.</em></div>
    </div>

    <div class="url">selora.fi</div>
    <div class="cta">Varaa ilmainen demo →</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Selora — Kampaamosi puhelin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  /* Pollinations free image API. Edit prompt or seed to regenerate.
     Pattern: https://image.pollinations.ai/prompt/<URL_ENCODED_PROMPT>?width=W&height=H&model=flux&seed=N&nologo=true&enhance=true */
  html, body { margin:0; padding:0; width:1080px; height:1350px; overflow:hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    background: #060c18;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .bg-photo {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    filter: brightness(0.55) saturate(0.85) contrast(1.05);
  }

  /* Brand blue color grade over the photo */
  .grade {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 900px 700px at 30% 35%, rgba(29,78,216,0.42) 0%, rgba(6,12,24,0) 65%),
      radial-gradient(ellipse 800px 700px at 75% 65%, rgba(59,130,246,0.30) 0%, rgba(6,12,24,0) 65%);
    mix-blend-mode: screen;
  }

  /* Bottom overlay for text legibility */
  .overlay {
    position:absolute;
    left:0; right:0; bottom:0;
    height: 760px;
    background: linear-gradient(180deg, rgba(6,12,24,0) 0%, rgba(6,12,24,0.88) 55%, rgba(6,12,24,0.97) 100%);
  }

  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(96,165,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 800px 600px at 50% 50%, #000 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 800px 600px at 50% 50%, #000 0%, transparent 80%);
    opacity: 0.5;
  }

  .noise {
    position:absolute; inset:0;
    opacity: 0.07; mix-blend-mode: overlay; pointer-events:none;
  }

  .content { position:relative; z-index:3; width:100%; height:100%; }

  .logo { position:absolute; top:60px; left:60px; display:flex; align-items:center; gap:14px; }
  .logo-mark {
    width:42px; height:42px; border-radius: 11px;
    background: linear-gradient(135deg, #1D4ED8 0%, #3b82f6 100%);
    box-shadow: 0 8px 24px rgba(29,78,216,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
    position:relative;
  }
  .logo-mark::after {
    content:""; position:absolute; inset:0; border-radius:11px;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35), transparent 55%);
  }
  .logo-text { font-weight: 600; letter-spacing: 0.08em; font-size: 20px; color: #fff; }

  .headline-block { position:absolute; bottom: 220px; left: 60px; right: 60px; }

  .eyebrow {
    font-weight: 500; font-size: 18px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #60a5fa; margin-bottom: 22px;
  }

  .h1 {
    font-weight: 300; font-size: 76px; line-height: 1.05;
    letter-spacing: -0.025em; color:#fff;
    text-shadow: 0 2px 0 rgba(0,0,0,0.3), 0 8px 30px rgba(0,0,0,0.7);
  }

  .h1-italic {
    display:block; font-family: 'Instrument Serif', serif;
    font-style: italic; font-weight: 400;
    font-size: 64px; color: #93c5fd;
    margin-top: 10px; line-height: 1.05;
  }

  .sub {
    margin-top: 36px; font-weight: 500;
    font-size: 32px; line-height: 1.35;
    color: rgba(255,255,255,0.88); letter-spacing: -0.005em;
  }

  .bottom {
    position:absolute; bottom: 80px; left: 60px; right: 60px;
    display:flex; align-items:center; justify-content: space-between;
  }
  .url { font-size: 22px; font-weight: 500; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; }
  .cta {
    background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
    color: #0f172a; font-weight: 600; font-size: 22px;
    padding: 20px 34px; border-radius: 999px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.9);
  }
</style>
</head>
<body>
  <!--
    PHOTO BG SOURCES (free, no key):
    1. Primary = Unsplash CDN (real photo). Swap photo-ID for any /photo-XXXX page on unsplash.com.
       Other vetted salon IDs: 1521590832167-7bcbfaa6381f, 1562322140-8baeececf3df,
       1503951914875-452162b0f3f1, 1522337660859-02fbefca4702, 1599351431202-1e0f0137899a
    2. Fallback (onerror) = Pollinations AI (Flux). Edit prompt or seed to regenerate.
  -->
  <img class="bg-photo"
       src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=1080&h=1350&fit=crop&q=85&auto=format"
       onerror="this.onerror=null;this.src='https://image.pollinations.ai/prompt/Modern%20Scandinavian%20hair%20salon%20interior%2C%20empty%20styling%20chair%2C%20large%20oval%20mirror%2C%20warm%20wooden%20floor%2C%20soft%20natural%20daylight%20from%20window%2C%20cinematic%20wide%20shot%2C%20shallow%20depth%20of%20field%2C%20professional%20interior%20photography%2C%20editorial%20magazine%20style?width=1080&height=1350&model=flux&seed=21&nologo=true&enhance=true';"
       alt="">
  <div class="grade"></div>
  <div class="grid"></div>
  <div class="overlay"></div>
  <svg class="noise" xmlns="http://www.w3.org/2000/svg">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="content">
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">SELORA</div>
    </div>

    <div class="headline-block">
      <div class="eyebrow">Kampaamot</div>
      <div class="h1">Kampaamosi puhelin.
        <span class="h1-italic">Kuka vastaa kun olet leikkaamassa?</span>
      </div>
      <div class="sub">Selora vastaa puolestasi. 24/7.</div>
    </div>

    <div class="bottom">
      <div class="url">selora.fi</div>
      <div class="cta">Varaa demo →</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Selora — Recover 78% of missed calls</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1200px; height:628px; overflow:hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    background: #060c18;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .aurora {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 800px 500px at 20% 30%, rgba(29,78,216,0.55) 0%, rgba(6,12,24,0) 60%),
      radial-gradient(ellipse 600px 500px at 90% 80%, rgba(59,130,246,0.4) 0%, rgba(6,12,24,0) 65%),
      radial-gradient(ellipse 500px 400px at 50% 50%, rgba(96,165,250,0.18) 0%, rgba(6,12,24,0) 70%),
      linear-gradient(180deg, #050a14 0%, #060c18 50%, #04080f 100%);
  }
  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(96,165,250,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse 700px 400px at 50% 50%, #000 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 700px 400px at 50% 50%, #000 0%, transparent 80%);
  }
  .noise {
    position:absolute; inset:0;
    opacity: 0.05; mix-blend-mode: overlay; pointer-events:none;
  }
  .content { position:relative; z-index:2; width:100%; height:100%; }

  /* Logo top-right */
  .logo {
    position:absolute; top: 40px; right: 50px;
    display:flex; align-items:center; gap: 14px;
  }
  .logo-mark {
    width:38px; height:38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1D4ED8 0%, #3b82f6 100%);
    box-shadow:
      0 6px 18px rgba(29,78,216,0.45),
      inset 0 1px 0 rgba(255,255,255,0.25);
    position:relative;
  }
  .logo-mark::after {
    content:""; position:absolute; inset:0;
    border-radius:10px;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35), transparent 55%);
  }
  .logo-text {
    font-weight: 600;
    letter-spacing: 0.08em;
    font-size: 18px;
  }

  /* Left content */
  .left {
    position:absolute;
    top: 50%; left: 60px;
    transform: translateY(-50%);
    width: 660px;
  }

  .eyebrow {
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #60a5fa;
    margin-bottom: 18px;
  }

  .stat {
    font-weight: 900;
    font-size: 220px;
    line-height: 0.92;
    letter-spacing: -0.05em;
    background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.5) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 8px 30px rgba(96,165,250,0.4));
    margin: 0;
  }
  .stat .pct { font-size: 130px; vertical-align: 0.2em; margin-left: -4px; }

  .subhead {
    font-weight: 400;
    font-size: 30px;
    line-height: 1.25;
    color: #fff;
    margin-top: 16px;
    letter-spacing: -0.01em;
  }

  /* Right phone illustration */
  .phone-area {
    position:absolute;
    top: 50%; right: 90px;
    transform: translateY(-50%);
    width: 360px; height: 360px;
    display:flex; align-items:center; justify-content:center;
  }
  .ring {
    position:absolute;
    border-radius:50%;
    border: 2px solid rgba(96,165,250,0.6);
    box-shadow: 0 0 30px rgba(96,165,250,0.25);
  }
  .ring-1 { width: 130px; height:130px; opacity: 0.95; }
  .ring-2 { width: 220px; height:220px; opacity: 0.55; border-color: rgba(96,165,250,0.4); }
  .ring-3 { width: 320px; height:320px; opacity: 0.3; border-color: rgba(96,165,250,0.28); }

  .phone-icon {
    width: 78px; height: 78px;
    border-radius: 22px;
    background: linear-gradient(135deg, #1D4ED8 0%, #3b82f6 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:
      0 12px 36px rgba(29,78,216,0.55),
      inset 0 1px 0 rgba(255,255,255,0.3);
    position:relative; z-index:2;
  }
  .phone-icon svg { width: 38px; height:38px; }

  /* CTA bottom-right */
  .cta {
    position: absolute;
    bottom: 38px; right: 50px;
    background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
    color: #0f172a;
    font-weight: 600;
    font-size: 16px;
    padding: 14px 24px;
    border-radius: 999px;
    box-shadow:
      0 10px 30px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.9);
  }
</style>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid"></div>
  <svg class="noise" xmlns="http://www.w3.org/2000/svg">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="content">
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">SELORA</div>
    </div>

    <div class="left">
      <div class="eyebrow">AI Receptionist</div>
      <div class="stat">78<span class="pct">%</span></div>
      <div class="subhead">Recover 78% of missed calls.<br>Finnish AI receptionist, 24/7.</div>
    </div>

    <div class="phone-area">
      <div class="ring ring-3"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-1"></div>
      <div class="phone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
    </div>

    <div class="cta">Book a free demo →</div>
  </div>
</body>
</html>

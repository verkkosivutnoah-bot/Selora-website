<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Selora — 48h käyttöönotto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1200px; height:628px; overflow:hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #0f172a;
    background: #f8fafc;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .bg-grad {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 800px 400px at 50% 100%, rgba(29,78,216,0.08) 0%, rgba(248,250,252,0) 60%),
      radial-gradient(ellipse 600px 400px at 50% 0%, rgba(96,165,250,0.06) 0%, rgba(248,250,252,0) 60%),
      #f8fafc;
  }

  .content { position:relative; z-index:2; width:100%; height:100%; }

  /* Logo top-right */
  .logo {
    position:absolute; top: 36px; right: 50px;
    display:flex; align-items:center; gap: 12px;
  }
  .logo-mark {
    width:36px; height:36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1D4ED8 0%, #3b82f6 100%);
    box-shadow:
      0 6px 18px rgba(29,78,216,0.3),
      inset 0 1px 0 rgba(255,255,255,0.4);
    position:relative;
  }
  .logo-mark::after {
    content:""; position:absolute; inset:0;
    border-radius:10px;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.45), transparent 55%);
  }
  .logo-text {
    font-weight: 600;
    letter-spacing: 0.08em;
    font-size: 18px;
    color: #0f172a;
  }

  /* Stat */
  .stat-block {
    position:absolute;
    top: 60px; left: 50px;
    width: 700px;
  }
  .eyebrow {
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #1D4ED8;
    margin-bottom: 10px;
  }
  .stat {
    font-weight: 900;
    font-size: 200px;
    line-height: 0.9;
    letter-spacing: -0.05em;
    color: #0f172a;
    margin: 0;
    background: linear-gradient(180deg, #0f172a 0%, #334155 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }
  .stat .unit {
    font-size: 110px;
    color: #1D4ED8;
    -webkit-text-fill-color: #1D4ED8;
    margin-left: 8px;
    vertical-align: 0.18em;
  }

  /* Timeline */
  .timeline {
    position:absolute;
    bottom: 130px;
    left: 60px; right: 60px;
    display:flex;
    align-items:center;
    justify-content: space-between;
  }
  .node {
    display:flex; flex-direction:column; align-items:center;
    position:relative;
    flex-shrink: 0;
    width: 200px;
  }
  .node-circle {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1D4ED8 0%, #3b82f6 100%);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    display:flex; align-items:center; justify-content:center;
    box-shadow:
      0 6px 18px rgba(29,78,216,0.35),
      inset 0 1px 0 rgba(255,255,255,0.35);
    z-index:2;
  }
  .node-label {
    margin-top: 14px;
    font-weight: 500;
    font-size: 16px;
    color: #0f172a;
    text-align:center;
    letter-spacing: -0.005em;
  }
  .node-num {
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.18em;
    margin-bottom: 2px;
    display:block;
  }

  /* Connecting line */
  .timeline::before {
    content:"";
    position:absolute;
    top: 19px;
    left: 100px; right: 100px;
    height: 1.5px;
    background: linear-gradient(90deg, #1D4ED8 0%, #3b82f6 50%, #60a5fa 100%);
    opacity: 0.6;
    z-index: 1;
  }

  /* Sub text below timeline */
  .sub {
    position:absolute;
    bottom: 70px;
    left: 60px; right: 60px;
    text-align:center;
    font-weight: 300;
    font-size: 26px;
    color: #64748b;
    letter-spacing: -0.005em;
    line-height: 1.3;
  }
  .sub em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: #1D4ED8;
  }

  /* CTA bottom-right */
  .cta {
    position: absolute;
    top: 36px; right: 200px;
    background: linear-gradient(180deg, #1D4ED8 0%, #1e40af 100%);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    padding: 13px 22px;
    border-radius: 999px;
    box-shadow:
      0 10px 26px rgba(29,78,216,0.35),
      inset 0 1px 0 rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="bg-grad"></div>
  <div class="content">
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">SELORA</div>
    </div>
    <div class="cta">Varaa demo →</div>

    <div class="stat-block">
      <div class="eyebrow">Käyttöönotto</div>
      <div class="stat">48<span class="unit">h</span></div>
    </div>

    <div class="timeline">
      <div class="node">
        <div class="node-circle">01</div>
        <div class="node-label"><span class="node-num">VAIHE 1</span>Kartoitus</div>
      </div>
      <div class="node">
        <div class="node-circle">02</div>
        <div class="node-label"><span class="node-num">VAIHE 2</span>Persoonan luonti</div>
      </div>
      <div class="node">
        <div class="node-circle">03</div>
        <div class="node-label"><span class="node-num">VAIHE 3</span>Integrointi</div>
      </div>
      <div class="node">
        <div class="node-circle">04</div>
        <div class="node-label"><span class="node-num">VAIHE 4</span>Live</div>
      </div>
    </div>

    <div class="sub">Käyttöönotto valmis. <em>Sinä keskityt asiakkaisiin.</em></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palauta salasana — Selora</title>
  <meta name="description" content="Palauta Selora-tilisi salasana." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      background: #060c18;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #0d1526;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.18em;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #1D4ED8, #3b82f6);
      border-radius: 8px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .form-group { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.6rem;
      padding: 0.7rem 0.9rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(96,165,250,0.5); }
    input::placeholder { color: rgba(255,255,255,0.28); }

    .btn {
      width: 100%;
      background: #1D4ED8;
      color: #fff;
      border: none;
      border-radius: 0.6rem;
      padding: 0.75rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover:not(:disabled) { background: #1e40af; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .auth-alert {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 0.6rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .auth-alert.error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.28); color: #fca5a5; }
    .auth-alert.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.28); color: #6ee7b7; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.8); }

    #request-view, #update-view { display: none; }
  </style>
<script src="/i18n.js" defer></script>
</head>
<body>

<div class="card">
  <a href="kirjaudu.html" class="logo">
    <div class="logo-icon"></div>
    SELORA
  </a>

  <!-- ── REQUEST FLOW (no token in URL) ────────────────────────────── -->
  <div id="request-view">
    <h1>Unohditko salasanan?</h1>
    <p class="subtitle">Syötä sähköpostiosoitteesi, niin lähetämme palautuslinkin.</p>

    <div id="req-alert" class="auth-alert"></div>

    <form id="request-form">
      <div class="form-group">
        <label for="req-email">Sähköpostiosoite</label>
        <input id="req-email" type="email" placeholder="sinun@email.fi" autocomplete="email" required />
      </div>
      <button type="submit" class="btn" id="req-btn">Lähetä palautuslinkki →</button>
    </form>

    <a href="kirjaudu.html" class="back-link">← Takaisin kirjautumiseen</a>
  </div>

  <!-- ── UPDATE FLOW (token in URL hash) ───────────────────────────── -->
  <div id="update-view">
    <h1>Aseta uusi salasana</h1>
    <p class="subtitle">Valitse uusi salasana tilillesi.</p>

    <div id="upd-alert" class="auth-alert"></div>

    <form id="update-form">
      <div class="form-group">
        <label for="new-password">Uusi salasana</label>
        <input id="new-password" type="password" placeholder="Vähintään 8 merkkiä" autocomplete="new-password" required minlength="8" />
      </div>
      <div class="form-group">
        <label for="confirm-password">Vahvista salasana</label>
        <input id="confirm-password" type="password" placeholder="Toista salasana" autocomplete="new-password" required minlength="8" />
      </div>
      <button type="submit" class="btn" id="upd-btn">Tallenna uusi salasana →</button>
    </form>

    <a href="kirjaudu.html" class="back-link">← Takaisin kirjautumiseen</a>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://zubhxdlssoochwbwyxlp.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymh4ZGxzc29vY2h3Ynd5eGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyOTM1ODQsImV4cCI6MjA5MTg2OTU4NH0.czrg_VzVMobfT0lMSZhggBYSV-VEIcggmufUOCntexU';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { storageKey: 'selora-client' }
  });

  const requestView = document.getElementById('request-view');
  const updateView  = document.getElementById('update-view');

  // ── Detect which flow to show ─────────────────────────────────────────────
  // Supabase puts the recovery token in the URL hash after the user clicks the email link.
  // onAuthStateChange fires PASSWORD_RECOVERY when the token is exchanged.
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      // Token valid — show the update-password form
      requestView.style.display = 'none';
      updateView.style.display  = 'block';
    }
  });

  // Check if there is a hash with access_token (initial page load with token)
  if (window.location.hash && window.location.hash.includes('access_token')) {
    // Supabase SDK will pick up the token and fire PASSWORD_RECOVERY above.
    // Show update view while waiting (will be confirmed by onAuthStateChange).
    updateView.style.display = 'block';
  } else {
    // No token — show request form
    requestView.style.display = 'block';
  }

  // ── Request flow ──────────────────────────────────────────────────────────
  document.getElementById('request-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('req-email').value.trim();
    const btn   = document.getElementById('req-btn');
    const alert = document.getElementById('req-alert');

    alert.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Lähetetään...';

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-salasana.html',
    });

    btn.disabled = false;
    btn.textContent = 'Lähetä palautuslinkki →';

    if (error) {
      showAlert('req-alert', 'error', 'Virhe: ' + error.message);
    } else {
      showAlert('req-alert', 'success', 'Palautuslinkki lähetetty! Tarkista sähköpostisi.');
    }
  });

  // ── Update flow ───────────────────────────────────────────────────────────
  document.getElementById('update-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const newPw     = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;
    const btn       = document.getElementById('upd-btn');

    if (newPw !== confirmPw) {
      showAlert('upd-alert', 'error', 'Salasanat eivät täsmää.');
      return;
    }
    if (newPw.length < 8) {
      showAlert('upd-alert', 'error', 'Salasanan tulee olla vähintään 8 merkkiä.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Tallennetaan...';

    const { error } = await sb.auth.updateUser({ password: newPw });

    btn.disabled = false;
    btn.textContent = 'Tallenna uusi salasana →';

    if (error) {
      showAlert('upd-alert', 'error', 'Virhe: ' + error.message);
    } else {
      showAlert('upd-alert', 'success', 'Salasana vaihdettu! Sinut ohjataan kojelautaan...');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1800);
    }
  });

  function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    el.className = 'auth-alert ' + type;
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
